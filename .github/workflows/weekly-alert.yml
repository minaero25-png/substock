# .github/workflows/daily-alert.yml
# ส่งแจ้งเตือนยาใกล้หมดอายุผ่าน Telegram ทุกวันจันทร์ 09:00 ICT (02:00 UTC)

name: Weekly Expiry Alert

on:
  schedule:
    # 02:00 UTC = 09:00 ICT (เวลาไทย) ทุกวันจันทร์
    - cron: '0 2 * * 1'

  # กดรันมือได้จากหน้า Actions
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert.py
